# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Forces downloading all history and tags

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        pytest

    - name: Build with PyInstaller
      run: |
        python src/generate_version.py
        pyinstaller VoiceVis.spec

    - name: Read Version from Python
      id: get_version
      shell: bash # Use bash to avoid PowerShell quote-escaping issues
      run: |
        python -c "
        import os
        
        # Read the version file safely
        version_globals = {}
        with open('src/_version.py', 'r', encoding='utf-8') as f:
            exec(f.read(), version_globals)
        version = version_globals.get('__version__', 'VERSION_UNKNOWN')
        
        # Append the dynamic name directly to the GitHub outputs file
        with open(os.environ['GITHUB_OUTPUT'], 'a') as env_file:
            env_file.write(f'ARTIFACT_NAME=VoiceVis-{version}\n')
        "

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # Use the variable set by our Python script
        name: ${{ steps.get_version.outputs.ARTIFACT_NAME }}-Windows
        # PyInstaller outputs the folder to dist/<name> in onedir mode
        path: dist/VoiceVis-*/
        retention-days: 3